<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bot Login</title>
  <link rel="stylesheet" href="/components/style.css" />
</head>
<body class="LoginPage">
  <div id="root">
    <div class="LoginCard">
      <h1 style="text-align:center; margin-bottom:20px; color:#667eea;">🤖 Bot Login</h1>
      <form id="loginForm">
        <div class="LoginField">
          <input type="text" id="account" placeholder="Account" required />
        </div>
        <div class="LoginField">
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <button type="submit" class="LoginBtn" style="width:100%;">Login</button>
      </form>
      <div id="errorMsg" style="color:red; margin-top:10px; display:none;"></div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const account = document.getElementById('account').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({account, password})
        });
        const data = await res.json();
        if (data.ok) {
          // Redirect về dashboard của bot
          if (data.redirect) {
            window.location.href = data.redirect;
          } else {
            window.location.href = '/bot/' + data.botIntId + '/dashboard';
          }
        } else {
          errorMsg.textContent = data.error || 'Login failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
