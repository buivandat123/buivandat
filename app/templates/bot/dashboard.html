<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bot Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-dark bg-dark border-bottom">
        <div class="container">
            <a class="navbar-brand" href="#">🤖 {{ bot.username }}</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/bot/{{ bot.botIntId }}/logout">Đăng xuất</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>📊 Dashboard</h2>
        <hr>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5>Thông tin bot</h5>
                        <p><strong>Tên:</strong> {{ bot.username }}</p>
                        <p><strong>ID:</strong> {{ bot.botIntId }}</p>
                        <p><strong>Prefix:</strong> <code>{{ bot.prefix }}</code></p>
                        <p><strong>Trạng thái:</strong> {% if bot.status %}🟢 Đang chạy{% else %}🔴 Đã tắt{% endif %}</p>
                        <p><strong>Hết hạn:</strong> {{ bot.expiredTime or 'Vĩnh viễn' }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5>Cài đặt</h5>
                        <form id="update-form">
                            <div class="mb-3">
                                <label>Đổi prefix</label>
                                <input type="text" id="new-prefix" class="form-control" value="{{ bot.prefix }}" placeholder="Nhập prefix mới...">
                            </div>
                            <button type="submit" class="btn btn-primary">Cập nhật</button>
                        </form>
                        <div id="update-result" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('update-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const prefix = document.getElementById('new-prefix').value;
        const result = document.getElementById('update-result');
        try {
            const resp = await fetch('/bot/{{ bot.botIntId }}/api/update', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({prefix: prefix})
            });
            const data = await resp.json();
            if(data.ok) {
                result.innerHTML = '<div class="alert alert-success">✅ Đã cập nhật prefix!</div>';
                setTimeout(() => location.reload(), 1500);
            } else {
                result.innerHTML = '<div class="alert alert-danger">❌ Lỗi: '+data.error+'</div>';
            }
        } catch(e) {
            result.innerHTML = '<div class="alert alert-danger">❌ Lỗi kết nối</div>';
        }
    });
    </script>
</body>
</html>
